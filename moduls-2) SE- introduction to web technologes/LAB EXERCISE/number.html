<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Prime Number Checker</title>

<style>
    body {
        font-family: Arial;
        background: #f0f0f0;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
    }

    .box {
        background: white;
        padding: 25px;
        border-radius: 10px;
        box-shadow: 0 0 10px rgba(0,0,0,0.2);
        text-align: center;
    }

    input {
        padding: 10px;
        margin: 10px;
        width: 200px;
    }

    button {
        padding: 10px 15px;
        margin: 5px;
        border: none;
        background: #007bff;
        color: white;
        border-radius: 5px;
        cursor: pointer;
    }

    button:hover {
        background: #0056b3;
    }

    p {
        margin-top: 10px;
        font-weight: bold;
    }
</style>
</head>

<body>

<div class="box">
    <h2>Prime Number Program</h2>

    <input type="number" id="num" placeholder="Enter a number"><br>

    <button onclick="checkPrime()">Check Prime</button>
    <button onclick="printPrimes()">Print Primes (1 to N)</button>

    <p id="result"></p>
</div>

<script>

// ✅ Check if a number is prime (using for loop)
function checkPrime() {
    let n = Number(document.getElementById("num").value);
    let isPrime = true;

    if (n <= 1) {
        isPrime = false;
    } else {
        for (let i = 2; i <= n / 2; i++) {
            if (n % i === 0) {
                isPrime = false;
                break;
            }
        }
    }

    document.getElementById("result").innerText =
        isPrime ? n + " is a Prime Number" : n + " is NOT a Prime Number";
}


// ✅ Print all primes from 1 to N
function printPrimes() {
    let n = Number(document.getElementById("num").value);
    let primes = "";

    for (let i = 2; i <= n; i++) {
        let isPrime = true;

        for (let j = 2; j <= i / 2; j++) {
            if (i % j === 0) {
                isPrime = false;
                break;
            }
        }

        if (isPrime) {
            primes += i + " ";
        }
    }

    document.getElementById("result").innerText =
        "Prime numbers: " + primes;
}

</script>

</body>
</html>
