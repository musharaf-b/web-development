<!DOCTYPE html>
<html>

<head>
    <title>Fibonacci Program</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        .box {
            border: 1px solid black;
            display: inline-block;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Fibonacci Series (N = 6)</h2>
        <p>0, 1, 1, 2, 3, 5</p>

        <h3>Nth Fibonacci Number</h3>
        <p>6th term = 5</p>

        <h3>Efficiency</h3>
        <p>Iterative → Fast</p>
        <p>Recursive → Slow</p>
    </div>

</body>

</html>
