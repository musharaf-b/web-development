
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Student Grade Calculator</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f4f4;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 0 10px rgba(0,0,0,0.2);
            text-align: center;
        }

        input {
            padding: 10px;
            width: 200px;
            margin: 10px 0;
        }

        button {
            padding: 10px 20px;
            background: #007BFF;
            color: white;
            border: none;
            cursor: pointer;
            border-radius: 5px;
        }

        button:hover {
            background: #0056b3;
        }

        #result {
            margin-top: 15px;
            font-size: 20px;
            font-weight: bold;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>Grade Calculator</h2>
    <input type="number" id="marks" placeholder="Enter marks">
    <br>
    <button onclick="calculateGrade()">Check Grade</button>
    <div id="result"></div>
</div>

<script>
function calculateGrade() {
    let marks = document.getElementById("marks").value;
    let grade = "";

    if (marks > 90) {
        grade = "Grade A";
    } else if (marks > 75 && marks <= 90) {
        grade = "Grade B";
    } else if (marks > 50 && marks <= 75) {
        grade = "Grade C";
    } else {
        grade = "Grade D";
    }

    document.getElementById("result").innerText = grade;
}
</script>

</body>
</html>
