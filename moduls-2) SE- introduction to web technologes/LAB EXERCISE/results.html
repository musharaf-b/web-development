<!DOCTYPE html>
<html>

<head>
    <title>Matrix Addition</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }

        .box {
            border: 1px solid black;
            display: inline-block;
            padding: 20px;
            margin-top: 30px;
        }

        table {
            margin: 10px auto;
            border-collapse: collapse;
        }

        td {
            border: 1px solid black;
            padding: 10px;
            width: 40px;
        }
    </style>
</head>

<body>

    <div class="box">
        <h2>Matrix A</h2>
        <table>
            <tr>
                <td>1</td>
                <td>2</td>
            </tr>
            <tr>
                <td>3</td>
                <td>4</td>
            </tr>
        </table>

        <h2>Matrix B</h2>
        <table>
            <tr>
                <td>5</td>
                <td>6</td>
            </tr>
            <tr>
                <td>7</td>
                <td>8</td>
            </tr>
        </table>

        <h2>Result (A + B)</h2>
        <table>
            <tr>
                <td>6</td>
                <td>8</td>
            </tr>
            <tr>
                <td>10</td>
                <td>12</td>
            </tr>
        </table>

        <h3>3x3 Example (Addition)</h3>
        <table>
            <tr>
                <td>2</td>
                <td>4</td>
                <td>6</td>
            </tr>
            <tr>
                <td>8</td>
                <td>10</td>
                <td>12</td>
            </tr>
            <tr>
                <td>14</td>
                <td>16</td>
                <td>18</td>
            </tr>
        </table>

        <h3>3x3 Example (Multiplication Result)</h3>
        <table>
            <tr>
                <td>30</td>
                <td>36</td>
                <td>42</td>
            </tr>
            <tr>
                <td>66</td>
                <td>81</td>
                <td>96</td>
            </tr>
            <tr>
                <td>102</td>
                <td>126</td>
                <td>150</td>
            </tr>
        </table>
    </div>

</body>

</html>
