<!DOCTYPE html>
<html>
<head>
    <title>Multiplication Table</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }
        table {
            margin: auto;
            border-collapse: collapse;
        }
        td {
            border: 1px solid black;
            padding: 8px;
        }
    </style>
</head>
<body>

<h2>Multiplication Table of 5</h2>

<table>
    <tr><td>5 x 1 = 5</td></tr>
    <tr><td>5 x 2 = 10</td></tr>
    <tr><td>5 x 3 = 15</td></tr>
    <tr><td>5 x 4 = 20</td></tr>
    <tr><td>5 x 5 = 25</td></tr>
    <tr><td>5 x 6 = 30</td></tr>
    <tr><td>5 x 7 = 35</td></tr>
    <tr><td>5 x 8 = 40</td></tr>
    <tr><td>5 x 9 = 45</td></tr>
    <tr><td>5 x 10 = 50</td></tr>
</table>

</body>
</html>
