<!DOCTYPE html>
<html>
<head>
    <title>Factorial Program</title>
    <style>
        body {
            text-align: center;
            font-family: Arial;
        }
        .box {
            border: 1px solid black;
            display: inline-block;
            padding: 20px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Number: 5</h2>

    <p>Factorial = 5 × 4 × 3 × 2 × 1 = 120</p>

    <h3>Methods</h3>
    <p>Iterative → 120</p>
    <p>Recursive → 120</p>

    <h3>Performance</h3>
    <p>Iterative → Faster</p>
    <p>Recursive → Slower</p>
</div>

</body>
</html>
